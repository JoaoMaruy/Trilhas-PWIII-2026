<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cadastro</title>
<link rel="stylesheet" href="assets/css/global.css">
<link rel="stylesheet" href="assets/css/register.css">
</head>
<body>
<div class="navbar">
<span>🛒 E-commerce</span>
</div>
<div class="container">
<div class="card">
    <h2>Criar conta</h2>
    <input class="input" id="name" placeholder="Nome">
    <input class="input" id="email" placeholder="Email">
    <input class="input" id="password" type="password" placeholder="Senha">

    <div id="error-message" class="msg-erro"></div>

    <div class="button-group">
        <button class="btn btn-primary" onclick="register()">Cadastrar</button>
        <button class="btn btn-secondary" onclick="window.location.href='login.html'">Já tenho conta</button>
    </div>
</div>
</div>
</div>
<script src="assets/js/user.js"></script>
</body>
</html>
